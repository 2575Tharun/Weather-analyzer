<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard | Tharunraj</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
  background: linear-gradient(135deg,#020617,#0f172a);
  color:#e2e8f0;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

header{text-align:center;margin-bottom:25px;}
header h1{color:#38bdf8;font-size:2.2rem;}
header p{color:#94a3b8;}

.search{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.search input{
  flex:1;
  padding:12px;
  border-radius:8px;
  border:none;
  outline:none;
}

.search button{
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.search button:hover{background:#0ea5e9;}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.forecast{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.forecast div{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  min-width:110px;
  text-align:center;
}

.loading{
  text-align:center;
  color:#38bdf8;
}

.error{
  color:#f87171;
  text-align:center;
}

@media(max-width:768px){
  .search{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>🌤 Weather Dashboard</h1>
  <p>Real-time weather insights & analytics</p>
</header>

<div class="search">
  <input type="text" id="city" placeholder="Enter city name">
  <button id="searchBtn">Search</button>
  <button id="locationBtn">📍</button>
</div>

<div id="current" class="card"></div>

<div class="card">
  <h3>7-Day Forecast</h3>
  <div id="forecast" class="forecast"></div>
</div>

<div class="card">
  <h3>Temperature Chart</h3>
  <canvas id="tempChart"></canvas>
</div>

<div class="card">
  <h3>Humidity Chart</h3>
  <canvas id="humidityChart"></canvas>
</div>

</div>

<script>
const API_KEY = "19db5609661b0872ab52f462783012ae"; // 🔴 Replace this

const elements = {
  cityInput: document.getElementById('city'),
  searchBtn: document.getElementById('searchBtn'),
  locationBtn: document.getElementById('locationBtn'),
  current: document.getElementById('current'),
  forecast: document.getElementById('forecast')
};

let charts = {
  temp: null,
  humidity: null
};

// ================= EVENTS =================
elements.searchBtn.addEventListener('click', handleCitySearch);
elements.locationBtn.addEventListener('click', handleLocation);
window.addEventListener('load', handleLocation);

// ================= HANDLERS =================
function handleCitySearch(){
  const city = elements.cityInput.value.trim();
  if(!city) return showError("Please enter a city name");

  fetchWeather(buildCityURL(city));
}

function handleLocation(){
  if(!navigator.geolocation){
    return showError("Geolocation not supported");
  }

  showLoading("Getting your location...");

  navigator.geolocation.getCurrentPosition(
    ({coords})=>{
      console.log("Location:", coords);
      fetchWeather(buildCoordsURL(coords.latitude, coords.longitude));
    },
    (error)=>{
      console.error("Geolocation error:", error);

      let message = "Location error";
      switch(error.code){
        case error.PERMISSION_DENIED:
          message = "Permission denied. Allow location access.";
          break;
        case error.POSITION_UNAVAILABLE:
          message = "Location unavailable.";
          break;
        case error.TIMEOUT:
          message = "Location request timed out.";
          break;
      }
      showError(message);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

// ================= API =================
const buildCityURL = city =>
  `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}&units=metric`;

const buildCoordsURL = (lat, lon) =>
  `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`;

async function fetchWeather(url){
  showLoading("Fetching weather...");

  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error("Network error");

    const data = await res.json();
    if(data.cod !== "200") throw new Error("City not found");

    renderCurrent(data);
    renderForecast(data);
    renderCharts(data);

  }catch(err){
    console.error(err);
    showError(err.message);
  }
}

// ================= UI =================
function showLoading(msg){
  elements.current.innerHTML = `<p class="loading">${msg}</p>`;
  elements.forecast.innerHTML = "";
}

function showError(msg){
  elements.current.innerHTML = `<p class="error">${msg}</p>`;
  elements.forecast.innerHTML = "";
}

function renderCurrent({city, list}){
  const current = list[0];

  elements.current.innerHTML = `
    <h2>${city.name}</h2>
    <p><strong>${current.main.temp}°C</strong></p>
    <p>${current.weather[0].description}</p>
    <p>Humidity: ${current.main.humidity}%</p>
  `;
}

function renderForecast({list}){
  const daily = list.filter((_, i) => i % 8 === 0).slice(0,7);

  elements.forecast.innerHTML = daily.map(item=>{
    const date = new Date(item.dt_txt).toLocaleDateString();
    return `
      <div>
        <p>${date}</p>
        <p>${item.main.temp}°C</p>
      </div>
    `;
  }).join("");
}

// ================= CHART =================
function renderCharts({list}){
  const daily = list.filter((_, i) => i % 8 === 0).slice(0,7);

  const labels = daily.map(d => new Date(d.dt_txt).toLocaleDateString());
  const temps = daily.map(d => d.main.temp);
  const humidity = daily.map(d => d.main.humidity);

  charts.temp = createChart(charts.temp, 'tempChart', labels, temps, 'Temperature');
  charts.humidity = createChart(charts.humidity, 'humidityChart', labels, humidity, 'Humidity');
}

function createChart(existingChart, canvasId, labels, data, label){
  if(existingChart) existingChart.destroy();

  return new Chart(document.getElementById(canvasId),{
    type:'line',
    data:{
      labels,
      datasets:[{label, data}]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{labels:{color:'#e2e8f0'}}
      },
      scales:{
        x:{ticks:{color:'#94a3b8'}},
        y:{ticks:{color:'#94a3b8'}}
      }
    }
  });
}
</script>

</body>
</html>
