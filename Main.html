<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#020617;color:#e2e8f0}

.container{max-width:1100px;margin:auto;padding:20px}

header{text-align:center;margin-bottom:20px}
header h1{color:#38bdf8}

.search{display:flex;gap:10px;margin-bottom:20px}
.search input{flex:1;padding:10px;border-radius:5px;border:none}
.search button{padding:10px;background:#38bdf8;border:none;border-radius:5px;cursor:pointer}

.card{background:#0f172a;padding:20px;border-radius:10px;margin-bottom:20px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}

.forecast{display:flex;gap:10px;overflow-x:auto}
.forecast div{background:#1e293b;padding:10px;border-radius:8px;min-width:100px;text-align:center}

canvas{margin-top:20px}
</style>
</head>

<body>
<div class="container">
<header>
<h1>Weather Dashboard</h1>
<p>Real-time weather & analytics</p>
</header>

<div class="search">
<input type="text" id="city" placeholder="Enter city">
<button onclick="getWeather()">Search</button>
<button onclick="getLocationWeather()">📍</button>
</div>

<div id="current" class="card"></div>

<div class="card">
<h3>7-Day Forecast</h3>
<div id="forecast" class="forecast"></div>
</div>

<div class="card">
<h3>Temperature Chart</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="card">
<h3>Humidity Chart</h3>
<canvas id="humidityChart"></canvas>
</div>
</div>

<script>
const apiKey = "b1c5813e76eeebcf8677d20fa1cd679c"; // OpenWeatherMap

async function getWeather(){
const city = document.getElementById('city').value;
fetchWeather(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=metric`);
}

function getLocationWeather(){
navigator.geolocation.getCurrentPosition(pos=>{
const {latitude, longitude} = pos.coords;
fetchWeather(`https://api.openweathermap.org/data/2.5/forecast?lat=${latitude}&lon=${longitude}&appid=${apiKey}&units=metric`);
});
}

async function fetchWeather(url){
const res = await fetch(url);
const data = await res.json();

const current = data.list[0];
document.getElementById('current').innerHTML = `
<h2>${data.city.name}</h2>
<p>${current.main.temp}°C</p>
<p>${current.weather[0].description}</p>`;

let forecastHTML = '';
let temps = [];
let humidity = [];
let labels = [];

for(let i=0;i<7;i++){
const item = data.list[i*8];
const date = new Date(item.dt_txt).toLocaleDateString();
forecastHTML += `<div><p>${date}</p><p>${item.main.temp}°C</p></div>`;

labels.push(date);
temps.push(item.main.temp);
humidity.push(item.main.humidity);
}

document.getElementById('forecast').innerHTML = forecastHTML;

createChart('tempChart', labels, temps, 'Temperature');
createChart('humidityChart', labels, humidity, 'Humidity');
}

function createChart(id, labels, data, label){
new Chart(document.getElementById(id),{
 type:'line',
 data:{labels,datasets:[{label,data}]},
 options:{responsive:true}
});
}
</script>
</body>
</html>
